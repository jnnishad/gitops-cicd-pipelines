# Reusable workflow: build, test, security-scan, push image.
# Called from any app repo with:
#
#   jobs:
#     ci:
#       uses: jnnishad/gitops-cicd-pipelines/.github/workflows/reusable-build-test-scan.yml@main
#       with:
#         image_name: my-app
#       secrets: inherit

name: Reusable - Build, Test, Scan

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
      registry:
        required: false
        type: string
        default: "ghcr.io"
    secrets:
      SONAR_TOKEN:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for SonarQube blame

      - name: Run unit tests
        run: |
          if [ -f package.json ]; then npm ci && npm test; \
          elif [ -f requirements.txt ]; then pip install -r requirements.txt && pytest; \
          else echo "No recognized test runner, skipping"; fi

      - name: SonarQube scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (multi-stage, cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: false
          load: true
          tags: ${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image_name }}:${{ github.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image_name }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ github.repository }}/${{ inputs.image_name }}:latest
